spring.application.name=backend

# Oracle DB 연결 정보
spring.datasource.url=jdbc:oracle:thin:@192.168.0.237:1522/XEPDB1
spring.datasource.username=hr24
spring.datasource.password=hr24

# JWT 설정
jwt.secret=hr24-jwt-secret-key-hr24-jwt-secret-key-hr24
jwt.access-token-expiration=604800000

# JPA 설정
# none   : 테이블 자동 생성/수정 안함
# create : 실행 시 테이블 새로 생성
# update : Entity 기준으로 테이블 자동 수정
# Hibernate가 테이블을 자동 생성/수정하지 않음 (DDL 직접 관리)
spring.jpa.hibernate.ddl-auto=none
# 실행되는 SQL을 콘솔에 출력
spring.jpa.show-sql=true
# 출력되는 SQL을 보기 좋게 정렬
spring.jpa.properties.hibernate.format_sql=true
# Oracle DB에 맞는 SQL 문법 사용
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Spring Doc
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.hr24
springdoc.swagger-ui.path=/api.html

# File Upload(dev)
file.upload-path=C:/hr24/uploads

# 추후 배포 시 Linux 경로
# file.upload-path=/var/www/hr24/uploads

#개발과정에서 보안 정보 직접입력
#배포시에는 환경변수나 외부 설정 파일로 관리할 예정
